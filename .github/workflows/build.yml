name: Build Release AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Create local.properties
      run: |
        echo "sdk.dir=${{ runner.tool_cache }}/android-sdk" > local.properties
        echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "key.alias=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "key.password=${{ secrets.KEY_PASSWORD }}" >> local.properties

    - name: Build Release AAB
      run: gradle bundleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: social-cleaner-release
        path: app/build/outputs/bundle/release/*.aab
        retention-days: 30

    - name: Build Debug APK (for testing)
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: social-cleaner-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
